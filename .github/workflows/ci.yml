name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  RUSTFLAGS: -C debuginfo=0

jobs:
  python:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-python-
      - name: Install Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Audit locked Python dependencies
        run: |
          python -m pip_audit --require-hashes -r requirements/runtime.txt
          python -m pip_audit --require-hashes -r requirements/dev.txt
      - name: Ruff
        run: python -m ruff check python/mic_eq python/tests python/tools
      - name: Pyright
        run: python -m pyright
      - name: Version check
        run: python python/tools/check_versions.py
      - name: Workflow definition check
        run: python python/tools/check_workflows.py
      - name: Package source smoke
        run: python python/tools/package_smoke.py --source-only
      - name: Pytest
        run: python -m pytest python/tests -q
      - name: Semgrep
        run: python python/tools/run_semgrep.py --sarif semgrep-results.sarif
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          if-no-files-found: error
          retention-days: 14

  rust:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-rust-
      - name: Rust format
        run: cargo fmt --check
      - name: RustSec audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rust tests
        run: cargo test -p mic_eq_core
      - name: Release-mode control/DSP contention stress
        run: cargo test --release -p mic_eq_core --test stress_tests seeded_control_and_dsp_loops_remain_finite_under_contention
      - name: Clippy
        run: cargo clippy -p mic_eq_core --all-targets -- -D warnings
