name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff
        run: python -m ruff check python/mic_eq python/tests python/tools
      - name: Pyright
        run: python -m pyright
      - name: Version check
        run: python python/tools/check_versions.py
      - name: Package source smoke
        run: python python/tools/package_smoke.py --source-only
      - name: Pytest
        run: python -m pytest python/tests -q

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust format
        run: cargo fmt --check
      - name: Rust tests
        run: cargo test -p mic_eq_core --tests
      - name: Clippy
        run: cargo clippy -p mic_eq_core --all-targets -- -D warnings
