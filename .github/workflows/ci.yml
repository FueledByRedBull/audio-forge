name: CI

on:
  push:
    branches: ["master"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=0

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-python-
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -e .[dev]
      - name: Ruff
        run: python -m ruff check python/mic_eq python/tests python/tools
      - name: Pyright
        run: python -m pyright
      - name: Version check
        run: python python/tools/check_versions.py
      - name: Package source smoke
        run: python python/tools/package_smoke.py --source-only
      - name: Pytest
        run: python -m pytest python/tests -q

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-rust-
      - name: Rust format
        run: cargo fmt --check
      - name: Rust tests
        run: cargo test -p mic_eq_core
      - name: Clippy
        run: cargo clippy -p mic_eq_core --all-targets -- -D warnings
